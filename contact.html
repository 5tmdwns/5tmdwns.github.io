  <script>
    AOS.init({ duration: 700, easing: 'ease-in-out', once: true, offset: 60 });

    window.addEventListener('scroll', function() {
      document.getElementById('pf-nav').classList.toggle('pf-nav-scrolled', window.scrollY > 50);
    });

    document.getElementById('pf-hamburger').addEventListener('click', function() {
      this.classList.toggle('active');
      document.getElementById('pf-nav-links').classList.toggle('open');
    });

    function navigateTo(url) {
      document.body.classList.add('pf-page-exit');
      setTimeout(function() { window.location.href = url; }, 350);
    }
    document.querySelectorAll('.pf-nav-item').forEach(function(link) {
      link.addEventListener('click', function(e) {
        var href = this.getAttribute('href');
        if (href && !href.startsWith('#') && !href.startsWith('http') && !href.startsWith('mailto')) {
          e.preventDefault();
          navigateTo(href);
        }
      });
    });
  </script>
