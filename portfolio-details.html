<!DOCTYPE html>
<html lang="ko">
<head>
  <title>오승준 | 포트폴리오</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="shortcut icon" href="/images/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/aos.css">
  <link rel="stylesheet" href="css/custom.css">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    .pf-pdf-wrapper {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .pf-pdf-topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 24px;
      background: var(--pf-bg, #0d0d0d);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .pf-pdf-back {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }
    .pf-pdf-back:hover {
      color: #fff;
    }
    .pf-pdf-id {
      color: rgba(255,255,255,0.3);
      font-size: 0.8rem;
    }
    .pf-pdf-frame {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
    }
    .pf-pdf-missing {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.4);
      font-size: 1rem;
      gap: 8px;
    }
    .pf-pdf-missing span {
      font-size: 2rem;
    }
  </style>
</head>
<body>

  <div class="pf-pdf-wrapper">

    <div class="pf-pdf-topbar">
      <a href="portfolio.html" class="pf-pdf-back">&#8592; Works</a>
      <span class="pf-pdf-id" id="pdf-id-label"></span>
    </div>

    <iframe class="pf-pdf-frame" id="pdf-frame" src="" title="PDF Viewer"></iframe>

    <div class="pf-pdf-missing" id="pdf-missing" style="display:none;">
      <span>📄</span>
      <p>PDF 파일을 찾을 수 없습니다.</p>
      <small id="pdf-missing-name"></small>
    </div>

  </div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var id = params.get('id');

    if (id) {
      var pdfPath = id + '.pdf';
      document.getElementById('pdf-id-label').textContent = '#' + id;
      document.title = '오승준 | 포트폴리오 #' + id;

      var frame = document.getElementById('pdf-frame');
      frame.src = pdfPath;

      // PDF를 불러오지 못한 경우 안내 메시지 표시
      frame.addEventListener('error', function() {
        frame.style.display = 'none';
        document.getElementById('pdf-missing').style.display = 'flex';
        document.getElementById('pdf-missing-name').textContent = pdfPath;
      });
    } else {
      document.getElementById('pdf-frame').style.display = 'none';
      document.getElementById('pdf-missing').style.display = 'flex';
      document.getElementById('pdf-missing-name').textContent = 'id 파라미터가 없습니다.';
    }
  </script>

</body>
</html>
