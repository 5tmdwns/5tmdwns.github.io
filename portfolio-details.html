  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    window.addEventListener('scroll', function() {
      document.getElementById('pf-nav').classList.toggle('pf-nav-scrolled', window.scrollY > 50);
    });

    document.getElementById('pf-hamburger').addEventListener('click', function() {
      this.classList.toggle('active');
      document.getElementById('pf-nav-links').classList.toggle('open');
    });

    // 페이지 전환
    function navigateTo(url) {
      document.body.classList.add('pf-page-exit');
      setTimeout(function() { window.location.href = url; }, 350);
    }
    document.querySelectorAll('.pf-nav-item').forEach(function(link) {
      link.addEventListener('click', function(e) {
        var href = this.getAttribute('href');
        if (href && !href.startsWith('#') && !href.startsWith('http') && !href.startsWith('mailto')) {
          e.preventDefault();
          navigateTo(href);
        }
      });
    });

    // PDF 렌더링
    var params = new URLSearchParams(window.location.search);
    var id = params.get('id');

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    var container  = document.getElementById('pdf-pages');
    var pagination = document.getElementById('pdf-pagination');
    var currentPdf = null;

    function tryLoad(path) {
      return pdfjsLib.getDocument(path).promise.then(function(pdf) { return pdf; }).catch(function() { return null; });
    }

    function renderPdf(pdf) {
      currentPdf = pdf;
      container.innerHTML = '';

      var dpr    = window.devicePixelRatio || 1;
      var availW = container.offsetWidth;
      var availH = window.innerHeight - 160;

      var chain = Promise.resolve();
      for (var i = 1; i <= pdf.numPages; i++) {
        (function(n) {
          chain = chain.then(function() {
            return pdf.getPage(n).then(function(page) {
              var vp1      = page.getViewport({ scale: 1 });
              var fitScale = Math.min(availW / vp1.width, availH / vp1.height);
              var vp       = page.getViewport({ scale: fitScale * dpr });

              var canvas = document.createElement('canvas');
              canvas.width  = vp.width;
              canvas.height = vp.height;
              canvas.style.width  = (vp.width  / dpr) + 'px';
              canvas.style.height = (vp.height / dpr) + 'px';
              container.appendChild(canvas);
              return page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
            });
          });
        })(i);
      }
    }

    function setupPagination(pdfs) {
      pagination.style.display = 'flex';
      pdfs.forEach(function(pdf, idx) {
        var dot = document.createElement('button');
        dot.className = 'pf-works-dot' + (idx === 0 ? ' active' : '');
        dot.setAttribute('aria-label', (idx + 1) + '번째 파일');
        dot.addEventListener('click', function() {
          pagination.querySelectorAll('.pf-works-dot').forEach(function(d) { d.classList.remove('active'); });
          dot.classList.add('active');
          renderPdf(pdf);
        });
        pagination.appendChild(dot);
      });
    }

    function showMissing(name) {
      container.style.display = 'none';
      document.getElementById('pdf-missing').style.display = 'flex';
      document.getElementById('pdf-missing-name').textContent = name;
    }

    // 브라우저 줌 / 창 크기 변경 시 재렌더링
    var resizeTimer;
    window.addEventListener('resize', function() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function() {
        if (currentPdf) renderPdf(currentPdf);
      }, 200);
    });

    if (id) {
      document.title = '오승준 | 포트폴리오 #' + id;

      tryLoad(id + '-1.pdf').then(function(first) {
        if (first) {
          var pdfs = [first];
          (function tryNext(n) {
            tryLoad(id + '-' + n + '.pdf').then(function(pdf) {
              if (pdf) {
                pdfs.push(pdf);
                tryNext(n + 1);
              } else {
                setupPagination(pdfs);
                renderPdf(pdfs[0]);
              }
            });
          })(2);
        } else {
          tryLoad(id + '.pdf').then(function(pdf) {
            if (pdf) {
              renderPdf(pdf);
            } else {
              showMissing(id + '.pdf');
            }
          });
        }
      });
    } else {
      showMissing('id 파라미터가 없습니다.');
    }
  </script>
